<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON数据解析工具</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .header-left {
            flex: 1;
        }
        .header-left h2 {
            font-size: 16px;
            margin: 0 0 5px 0;
            color: #333;
        }
        .header-center {
            flex: 2;
            text-align: center;
        }
        .header-center h1 {
            font-size: 24px;
            margin: 0;
            color: #333;
        }
        .header-right {
            flex: 1;
            text-align: right;
        }
        input[type="file"] {
            font-size: 14px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .message {
            margin: 10px 0;
            font-size: 14px;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
        .table-container {
            margin-top: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h2>上传文件</h2>
                <input type="file" id="fileInput" accept=".txt,.json">
            </div>
            <div class="header-center">
                <h1>JSON数据解析工具</h1>
            </div>
            <div class="header-right">
                <button onclick="parseFile()">解析数据</button>
                <button onclick="exportToExcel()" id="exportButton" disabled>导出Excel</button>
            </div>
        </div>
        <div id="message" class="message"></div>
        
        <div class="table-container">
            <table id="resultTable">
                <!-- 动态生成表头和数据 -->
            </table>
        </div>
    </div>
    
    <script>
        let parsedData = [];
        
        function parseFile() {
            const fileInput = document.getElementById('fileInput');
            const message = document.getElementById('message');
            const exportButton = document.getElementById('exportButton');
            
            if (!fileInput.files.length) {
                message.innerHTML = '<div class="error">请先选择文件</div>';
                return;
            }
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    const data = JSON.parse(content);
                    
                    // 尝试找到数据数组
                    let dataArray = null;
                    
                    // 常见的数据字段名称
                    const dataFields = ['resultData', 'data', 'items', 'records', 'list'];
                    
                    // 检查是否直接是数组
                    if (Array.isArray(data)) {
                        dataArray = data;
                    } else {
                        // 检查常见的数据字段
                        for (const field of dataFields) {
                            if (data[field] && Array.isArray(data[field])) {
                                dataArray = data[field];
                                break;
                            }
                        }
                    }
                    
                    if (dataArray) {
                        parsedData = dataArray;
                        generateTable(parsedData);
                        message.innerHTML = `<div class="success">解析成功，共 ${parsedData.length} 条数据</div>`;
                        exportButton.disabled = false;
                    } else {
                        message.innerHTML = '<div class="error">文件格式错误，未找到数据数组</div>';
                        exportButton.disabled = true;
                    }
                } catch (error) {
                    message.innerHTML = `<div class="error">解析失败：${error.message}</div>`;
                    exportButton.disabled = true;
                }
            };
            
            reader.onerror = function() {
                message.innerHTML = '<div class="error">文件读取失败</div>';
                exportButton.disabled = true;
            };
            
            reader.readAsText(file);
        }
        
        function generateTable(data) {
            const table = document.getElementById('resultTable');
            table.innerHTML = '';
            
            if (data.length === 0) {
                table.innerHTML = '<tr><td colspan="100%">暂无数据</td></tr>';
                return;
            }
            
            // 生成表头
            const headers = Object.keys(data[0]);
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            
            headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header;
                headerRow.appendChild(th);
            });
            
            thead.appendChild(headerRow);
            table.appendChild(thead);
            
            // 生成数据行
            const tbody = document.createElement('tbody');
            
            data.forEach(item => {
                const row = document.createElement('tr');
                
                headers.forEach(header => {
                    const td = document.createElement('td');
                    td.textContent = item[header] !== null ? item[header] : '';
                    row.appendChild(td);
                });
                
                tbody.appendChild(row);
            });
            
            table.appendChild(tbody);
        }
        
        function exportToExcel() {
            if (parsedData.length === 0) {
                alert('没有数据可导出');
                return;
            }
            
            // 创建工作簿
            const wb = XLSX.utils.book_new();
            
            // 将数据转换为工作表
            const ws = XLSX.utils.json_to_sheet(parsedData);
            
            // 添加工作表到工作簿
            XLSX.utils.book_append_sheet(wb, ws, '数据');
            
            // 导出Excel文件
            XLSX.writeFile(wb, 'resultdata.xlsx');
        }
    </script>
</body>
</html>
